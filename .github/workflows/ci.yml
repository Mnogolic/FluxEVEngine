name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: fluxev_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fluxev_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/fluxev_ci
      ESI_BASE_URL: https://esi.evetech.net/latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Verify database schema
        run: |
          python - <<'PY'
          import asyncio
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.core.config import settings

          EXPECTED_TABLES = {"tracked_items", "market_history", "market_orders"}

          async def main():
              engine = create_async_engine(settings.database_url)
              async with engine.connect() as conn:
                  result = await conn.execute(text(
                      "select table_name from information_schema.tables "
                      "where table_schema = 'public'"
                  ))
                  tables = {row[0] for row in result}
              await engine.dispose()

              missing = EXPECTED_TABLES - tables
              if missing:
                  raise SystemExit(f"Missing tables after migration: {sorted(missing)}")

          asyncio.run(main())
          PY

      - name: Compile Python sources
        run: python -m compileall app scripts main.py

      - name: Smoke test FastAPI app import
        run: |
          python - <<'PY'
          import main

          assert main.app.title == "FluxEVEngine"
          paths = {route.path for route in main.app.routes}
          expected_paths = {"/", "/market/items", "/market/history/{type_id}", "/market/price/{type_id}"}
          missing = expected_paths - paths
          if missing:
              raise SystemExit(f"Missing API routes: {sorted(missing)}")

          print("FastAPI app import smoke test passed.")
          PY
