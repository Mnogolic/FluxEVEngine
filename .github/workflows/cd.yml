name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create source archive
        run: |
          mkdir -p dist
          git archive --format zip --output "dist/FluxEVEngine-${GITHUB_REF_NAME}.zip" HEAD

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxEVEngine-${{ github.ref_name }}
          path: dist/FluxEVEngine-${{ github.ref_name }}.zip

      - name: Attach archive to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FluxEVEngine-${{ github.ref_name }}.zip
