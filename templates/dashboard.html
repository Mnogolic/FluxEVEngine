<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FluxEV — Market Overview</title>
    <script src="/static/plotly.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 24px; }
        h1 { font-size: 22px; color: #58a6ff; margin-bottom: 4px; }
        p.sub { color: #8b949e; font-size: 13px; margin-bottom: 32px; }
        .charts { display: flex; flex-wrap: wrap; gap: 24px; }
        .chart-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; flex: 1; min-width: 420px; min-height: 560px; }
        .chart-box h2 { font-size: 15px; color: #c9d1d9; margin-bottom: 16px; }
        .selector-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        select {
            background: #21262d; color: #e6edf3; border: 1px solid #30363d;
            border-radius: 6px; padding: 6px 12px; font-size: 13px; min-width: 280px;
        }
        .meta { font-size: 12px; color: #8b949e; }
        #trend-up { color: #3fb950; }
        #trend-down { color: #f78166; }
    </style>
</head>
<body>
    <h1>FluxEVyEngine — Market Overview</h1>
    <p class="sub">Data from ESI Tranquility &middot; Last update: {{ last_date }} &middot; PLEX: {{ plex_isk }} ISK</p>

    <div class="charts">
        <div class="chart-box">
            <h2>Trade Turnover by Hub (ISK)</h2>
            <div id="chart-hubs"></div>
        </div>
        <div class="chart-box">
            <h2>Top 20 Items by Turnover in Jita</h2>
            <div style="display: flex; gap: 16px; align-items: flex-start;">
                <div id="chart-items" style="flex: 1;"></div>
                <div id="items-legend" style="min-width: 200px; font-size: 12px; color: #c9d1d9; padding-top: 8px;"></div>
            </div>
        </div>
    </div>

    <div class="charts" style="margin-top: 24px">
        <div class="chart-box" style="min-width: 100%">
            <h2>Price History + 7-day Forecast — Linear Regression</h2>
            <div class="selector-row">
                <select id="item-select" onchange="loadChart()">
                    {% for item in selector_items %}
                    <option value="{{ item.type_id }}">{{ item.name }}</option>
                    {% endfor %}
                </select>
                <select id="region-select" onchange="loadChart()">
                    <option value="10000002">Jita</option>
                    <option value="10000043">Amarr</option>
                    <option value="10000032">Dodixie</option>
                    <option value="10000042">Hek</option>
                    <option value="10000030">Rens</option>
                </select>
                <span class="meta" id="chart-meta"></span>
            </div>
            <div id="chart-price"></div>
        </div>
    </div>

    <script>
        const hubLabels     = {{ hub_labels | tojson }};
        const hubValuesIsk  = {{ hub_values_isk | tojson }};
        const hubValuesUsd  = {{ hub_values_usd | tojson }};
        const itemLabels    = {{ item_labels | tojson }};
        const itemValuesIsk = {{ item_values_isk | tojson }};
        const itemValuesUsd = {{ item_values_usd | tojson }};

        const layout = {
            paper_bgcolor: '#161b22',
            plot_bgcolor:  '#161b22',
            font:   { color: '#c9d1d9', size: 12 },
            margin: { t: 10, b: 10, l: 10, r: 10 },
            showlegend: true,
            legend: { orientation: 'v', font: { size: 11 } },
        };

        function hoverText(iskArr, usdArr) {
            return iskArr.map((isk, i) =>
                `ISK: ${isk.toLocaleString('en-US', {maximumFractionDigits: 0})}<br>USD: $${usdArr[i].toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`
            );
        }

        Plotly.newPlot('chart-hubs', [{
            type: 'pie', labels: hubLabels, values: hubValuesIsk, hole: 0.4,
            textinfo: 'label+percent',
            text: hoverText(hubValuesIsk, hubValuesUsd),
            hovertemplate: '<b>%{label}</b><br>%{text}<extra></extra>',
            domain: { x: [0.1, 0.9], y: [0, 1] },
        }], { ...layout, height: 480, autosize: true });

        Plotly.newPlot('chart-items', [{
            type: 'pie', labels: itemLabels, values: itemValuesIsk, hole: 0.4,
            textinfo: 'label+percent',
            textposition: 'outside',
            text: hoverText(itemValuesIsk, itemValuesUsd),
            hovertemplate: '<b>%{label}</b><br>%{text}<extra></extra>',
            domain: { x: [0.0, 1.0], y: [0, 1] },
        }], {
            ...layout,
            height: 520,
            autosize: true,
            margin: { t: 40, b: 40, l: 120, r: 120 },
            showlegend: false,
        });

        // список товаров справа
        const colors = ['#636efa','#ef553b','#00cc96','#ab63fa','#ffa15a',
                        '#19d3f3','#ff6692','#b6e880','#ff97ff','#fecb52',
                        '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
                        '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf'];
        const legend = document.getElementById('items-legend');
        legend.innerHTML = itemLabels.map((name, i) =>
            `<div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                <div style="width:10px; height:10px; border-radius:2px; background:${colors[i % colors.length]}; flex-shrink:0;"></div>
                <span style="color:#8b949e;">${name}</span>
            </div>`
        ).join('');

        async function loadChart() {
            const typeId   = document.getElementById('item-select').value;
            const regionId = document.getElementById('region-select').value;
            const res = await fetch(`/market/price/${typeId}?region_id=${regionId}`);
            const d = await res.json();

            const priceLayout = {
                paper_bgcolor: '#161b22', plot_bgcolor: '#161b22',
                font: { color: '#c9d1d9', size: 12 },
                margin: { t: 40, b: 60, l: 70, r: 20 },
                height: 400,
                xaxis: { title: 'Date', gridcolor: '#21262d', tickangle: -45 },
                yaxis: { title: 'Price (ISK)', gridcolor: '#21262d' },
                legend: { orientation: 'h', y: 1.1 },
            };

            Plotly.newPlot('chart-price', [
                {
                    type: 'scatter', mode: 'lines+markers', name: 'Actual price',
                    x: d.dates, y: d.values,
                    line: { color: '#58a6ff', width: 2 }, marker: { size: 4 },
                    hovertemplate: '%{x}<br>Price: %{y:.4f} ISK<extra></extra>',
                },
                {
                    type: 'scatter', mode: 'lines+markers', name: '7-day forecast',
                    x: d.forecast_dates, y: d.forecast_values,
                    line: { color: '#f78166', width: 2, dash: 'dash' },
                    marker: { size: 6, symbol: 'diamond' },
                    hovertemplate: '%{x}<br>Forecast: %{y:.4f} ISK<extra></extra>',
                }
            ], priceLayout);

            const arrow = d.slope >= 0 ? '↑' : '↓';
            const color = d.slope >= 0 ? '#3fb950' : '#f78166';
            document.getElementById('chart-meta').innerHTML =
                `<span style="color:${color}">${arrow} ${d.slope > 0 ? '+' : ''}${d.slope.toFixed(4)} ISK/day</span>
                 &nbsp;·&nbsp; R² = ${d.r2} &nbsp;·&nbsp; ${d.dates.length} data points`;
        }

        loadChart();
    </script>
</body>
</html>
